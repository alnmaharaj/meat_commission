name: Refresh Pro Clubs warehouse
on:
  schedule:
    - cron: "0 0-5,22-23 * * *"   # hourly, ~6pm-midnight ET year-round (UTC; no DST)
  workflow_dispatch: {}            # manual run button

permissions:
  contents: write                  # needed to commit the DB + raw back

concurrency:
  group: refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python loader.py
      - name: Commit changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Gate on raw/ only: a new match writes a new file under raw/, but the DB
          # bytes change on every run (views.sql is rebuilt each time). Committing on
          # DB churn alone would produce empty "data refresh" commits, so only commit
          # when raw/ actually gained matches, and include the DB alongside it.
          git add raw
          if git diff --staged --quiet -- raw; then
            echo "No new matches landed; skipping commit (ignoring DB byte churn)."
          else
            git add warehouse
            git commit -m "data refresh $(date -u +%FT%TZ)"
            git push
          fi
