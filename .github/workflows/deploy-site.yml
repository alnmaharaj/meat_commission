name: Deploy site

on:
  push:
    branches: ["feature/build-and-load"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site artifact
        run: |
          mkdir _site
          cp -r site/* _site/
          cp warehouse/clubstats.db _site/clubstats.db

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - uses: actions/deploy-pages@v4
        id: deploy
